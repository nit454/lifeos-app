<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS - MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-gold { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .card-flip { perspective: 1000px; }
        .card-inner { 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        .card-flip:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { 
            backface-visibility: hidden; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
        }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold accent-gold">LIFE OS</h1>
                <p class="text-sm opacity-60">AWAITING MASTER'S COMMAND</p>
            </div>
            <div class="glass p-3 rounded-xl text-right">
                <p class="text-xs opacity-50">STATUS</p>
                <p class="font-mono font-bold" id="sys-status">CONNECTING...</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-6">
                <section class="glass p-6 rounded-2xl">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span>🎯</span> Missions
                    </h2>
                    <div class="space-y-3" id="missions-list">
                        <p class="text-xs opacity-40">Loading missions...</p>
                    </div>
                </section>
                <section class="glass p-6 rounded-2xl">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span>⚔️</span> Skill Forge
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-3 rounded-lg bg-white/5 border border-white/10 text-center">
                            <p class="text-xs opacity-60">Wealth</p>
                            <p class="font-bold">LVL 14</p>
                        </div>
                        <div class="p-3 rounded-lg bg-white/5 border border-white/10 text-center">
                            <p class="text-xs opacity-60">Code</p>
                            <p class="font-bold">LVL 22</p>
                        </div>
                    </div>
                </section>
            </div>

            <div class="space-y-6">
                <section class="glass p-6 rounded-2xl min-h-[400px] flex flex-col">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span>🧠</span> Knowledge (SRS)
                    </h2>
                    <div class="card-flip w-full h-64 mb-6">
                        <div class="card-inner w-full h-full shadow-xl rounded-2xl bg-white/10 border border-white/20 flex items-center justify-center p-6 text-center">
                            <div class="card-front flex items-center justify-center p-6 text-center">
                                <p id="card-q" class="text-lg font-medium">Loading question...</p>
                            </div>
                            <div class="card-back flex items-center justify-center p-6 text-center bg-white/20 rounded-2xl">
                                <p id="card-a" class="text-lg">Loading answer...</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between gap-2 mt-auto">
                        <button class="px-3 py-1 rounded bg-red-500/20 text-red-400 border border-red-500/30 text-xs hover:bg-red-500/40">1</button>
                        <button class="px-3 py-1 rounded bg-orange-500/20 text-orange-400 border border-orange-500/30 text-xs hover:bg-orange-500/40">2</button>
                        <button class="px-3 py-1 rounded bg-blue-500/20 text-blue-400 border border-blue-500/30 text-xs hover:bg-blue-500/40">3</button>
                        <button class="px-3 py-1 rounded bg-green-500/20 text-green-400 border border-green-500/30 text-xs hover:bg-green-500/40">4</button>
                        <button class="px-3 py-1 rounded bg-gold/20 text-gold-400 border border-gold/30 text-xs hover:bg-gold-500/40">5</button>
                    </div>
                    <p class="text-center text-[10px] opacity-40 mt-2 uppercase tracking-widest">Rate your recall</p>
                </section>
            </div>

            <div class="space-y-6">
                <section class="glass p-6 rounded-2xl h-[500px] flex flex-col">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span>💬</span> Hermes Chat</h2>
                    <div class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2" id="chat-window">
                        <div class="p-3 rounded-lg bg-white/5 border border-white/10 text-sm">
                            <span class="font-bold accent-gold">HERMES:</span> System synchronized. Awaiting Master's command.
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="chat-input" placeholder="Command Hermes..." class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gold">
                        <button id="send-btn" class="bg-gold text-black font-bold px-4 py-2 rounded-lg text-sm hover:bg-yellow-600">Send</button>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function updateStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                document.getElementById('sys-status').innerText = data.status;
            } catch (e) {
                document.getElementById('sys-status').innerText = 'OFFLINE';
            }
        }

        async function loadMissions() {
            try {
                const res = await fetch(`${API_BASE}/missions`);
                const data = await res.json();
                const list = document.getElementById('missions-list');
                list.innerHTML = '';
                data.forEach(m => {
                    list.innerHTML += `
                        <div class="p-3 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition cursor-pointer">
                            <p class="text-sm font-medium">${m.title}</p>
                            <div class="w-full bg-gray-800 h-1 rounded-full mt-2">
                                <div class="bg-gold h-1 rounded-full" style="width: ${m.progress}%"></div>
                            </div>
                        </div>`;
                });
            } catch (e) {
                console.error('Missions error:', e);
            }
        }

        async function loadKnowledge() {
            try {
                const res = await fetch(`${API_BASE}/knowledge`);
                const data = await res.json();
                if (data.length > 0) {
                    document.getElementById('card-q').innerText = data[0].q;
                    document.getElementById('card-a').innerText = data[0].a;
                }
            } catch (e) {
                console.error('Knowledge error:', e);
            }
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const win = document.getElementById('chat-window');
            const msg = input.value;
            if (!msg) return;

            win.innerHTML += `<div class="p-3 rounded-lg bg-white/10 border border-white/10 text-sm text-right"><span class="font-bold opacity-60">MASTER:</span> ${msg}</div>`;
            input.value = '';

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                     encoding: 'application/json',
                     body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                win.innerHTML += `<div class="p-3 rounded-lg bg-white/5 border border-white/10 text-sm"><span class="font-bold accent-gold">HERMES:</span> ${data.response}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch (e) {
                win.innerHTML += `<div class="p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-sm text-red-400">Error connecting to Hermes.</div>`;
            }
        }

        document.getElementById('send-btn').addEventListener('click', sendChat);
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        updateStatus();
        loadMissions();
        loadKnowledge();
    </script>
</body>
</html>
